name: Validate Guideline Changes

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated model names to validate against"
        required: false
        default: "anthropic/claude-sonnet-4.5,anthropic/claude-opus-4.6,google/gemini-3-pro-preview,openai/gpt-5.2-codex"
        type: string
      filter:
        description: "Regex to filter evals (e.g. '000-fundamentals', '002-queries'). Leave empty for all."
        required: false
        default: ""
        type: string
      base_ref:
        description: "Base branch to compare against (defaults to main)"
        required: false
        default: "main"
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ENVIRONMENT: ci
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        run: npm install -g bun@1.3.8

      - name: Install dependencies
        run: bun install

      - name: Create temp directory
        run: mkdir -p /tmp/convex-evals-validation

      - name: Generate "after" guidelines (from this branch)
        run: |
          cp runner/models/guidelines.md /tmp/after-guidelines.md
          echo "=== After guidelines ($(wc -l < /tmp/after-guidelines.md) lines) ==="

      - name: Generate "before" guidelines (from base branch)
        run: |
          git show origin/${{ inputs.base_ref }}:runner/models/guidelines.md > /tmp/before-guidelines.md
          echo "=== Before guidelines ($(wc -l < /tmp/before-guidelines.md) lines) ==="

      - name: Show guidelines diff
        run: diff /tmp/before-guidelines.md /tmp/after-guidelines.md || true

      - name: Run guideline validation
        env:
          OUTPUT_TEMPDIR: /tmp/convex-evals-validation
        run: |
          ARGS="--before /tmp/before-guidelines.md --after /tmp/after-guidelines.md --models ${{ inputs.models }}"
          if [ -n "${{ inputs.filter }}" ]; then
            ARGS="$ARGS --filter ${{ inputs.filter }}"
          fi
          bun run scripts/validateGuidelines.ts $ARGS

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guideline-validation-${{ github.run_id }}
          path: guideline-validation/results/
          retention-days: 30
